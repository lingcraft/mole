[project]
name = "mole"
version = "1.7.14"
description = """
- 修复：元素骑士挑战封包发送间隔调整为50ms，待后面测试间隔是否合适（之前设定的通用的25ms，分开单独打70次无尽深渊、40次莎士摩亚或自选关卡时没问题，但是合起来打会导致莎士摩亚打不完，可能是之前优化掉一半封包数量导致间隔需要更长）
"""
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "cffi~=2.0.0",
    "nuitka~=4.1.3",
    "packaging~=26.2",
    "pypinyin~=0.55.0",
    "pyside6~=6.11.1",
    "requests~=2.34.2",
]
