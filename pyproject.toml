[project]
name = "mole"
version = "1.10.4"
description = """
- 优化：命令桥从0.5秒1次的HTTP轮询改为 socket 通信，解决调用Flash原生方法会有延迟的问题，同时经过测试无法使用 Flash 的 doCallback 的方式，因为QAxWidget的LoadMovie加载的方式没有脚本宿主
- 优化：swf 从修改原始的 ClientCommentDLL.swf 的方式改为通过注入修改客户端请求的 ext.xml 的 swf 加载清单，对其添加我们自己的 swf 文件，从而让客户端自动加载我们自己的 swf，大幅缩小 swf 体积
- 优化：注入修改客户端请求的 ext.xml 的方法现在可以加载我们目录下的所有自己的 swf 文件
- 优化：编写我们自己的 BridgeDLL.swf 通信 DLL，同时里面通过反射获取游戏中的类，供我们使用
- 优化：解决之前只能注入官服我们自己的 swf 的问题，现在新方式在平行服也可以加载自己的 swf 然后进行通信和调用 Flash 原生方法
- 优化：隔离不同服的 url，不然缓存都保存在 127.0.0.1 下，导致所有服游戏中加载的资源都是从同样的缓存中取的问题
- 优化：不同的服的版本的路径添加 “server{服在server_dict中的索引}” 前缀进行隔离，从而不同服即使都走的注入的 127.0.0.1 地址也能正常加载各自的不同缓存
- 优化：隔离规则为只隔离服，不隔离节点，从而同服的不同节点可以共用缓存，也间接优化了部分情况下的游戏加载速度
- 优化：通信命令格式优化，增加发送到 swf 的和从 swf 接收到的前缀标识“S ==>”、“R <==”，从而可以双向通信获取调用的原生 Flash 方法返回值的数据，暂不处理接受的数据，待以后拓展
- 优化：swf 中对消息添加0宽空格，因为游戏的 Alert.smileAlert 会检测重复（此条消息和上条消息相同则不会显示）消息，从而解决了获取相同道具的游戏内弹窗只弹1次的问题还同时不影响弹窗显示效果
"""
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "cffi~=2.1.0",
    "nuitka~=4.1.3",
    "packaging~=26.2",
    "py3amf~=0.9.1",
    "pypinyin~=0.55.0",
    "pyside6~=6.11.1",
    "requests~=2.34.2",
    "zstandard~=0.25",
]
