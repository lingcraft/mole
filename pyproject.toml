[project]
name = "mole"
version = "1.7.16"
description = """
- 优化：元素骑士开始时通过0x231D挑战包来准确获取无尽深渊和莎士摩亚关卡的已挑战次数，动态计算挑战次数，不再像以前一样写死，优化挑战逻辑，当这2个特殊关卡都达到每日上限时只挑战选定关卡
"""
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "cffi~=2.0.0",
    "nuitka~=4.1.3",
    "packaging~=26.2",
    "pypinyin~=0.55.0",
    "pyside6~=6.11.1",
    "requests~=2.34.2",
]
