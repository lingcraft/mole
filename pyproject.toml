[project]
name = "mole"
version = "1.8.4"
description = """
- 优化：开始自动做菜后禁止目标菜下拉框修改，防止不同菜的成熟时间不同导致定时任务异常的问题，停止后再允许修改
"""
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "cffi~=2.1.0",
    "nuitka~=4.1.3",
    "packaging~=26.2",
    "py3amf~=0.9.0",
    "pypinyin~=0.55.0",
    "pyside6~=6.11.1",
    "requests~=2.34.2",
    "zstandard~=0.25",
]
