[project]
name = "mole"
version = "1.7.21"
description = """
- 优化：元素骑士若战力达到“无尽深渊”的挑战标准，在10~13点期间，不发送“莎士摩亚”挑战包（用来获取已挑战次数）浪费体力
- 优化：元素骑士若战力未达到"无尽深渊"和“莎士摩亚”的挑战标准，不发送“无尽深渊”和“莎士摩亚”挑战包（用来获取已挑战次数）浪费体力
- 优化：功能区域第2页布局调整
"""
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "cffi~=2.0.0",
    "nuitka~=4.1.3",
    "packaging~=26.2",
    "pypinyin~=0.55.0",
    "pyside6~=6.11.1",
    "requests~=2.34.2",
]
