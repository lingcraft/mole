[project]
name = "mole"
version = "1.8.2"
description = """
- 修复：第1轮做菜成功后第2轮及以后收菜做菜失败的问题修复，因为做菜后菜ID变了，现在传回主进程进行更新菜ID信息从而修复了多轮做菜问题
"""
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "cffi~=2.1.0",
    "nuitka~=4.1.3",
    "packaging~=26.2",
    "py3amf~=0.9.0",
    "pypinyin~=0.55.0",
    "pyside6~=6.11.1",
    "requests~=2.34.2",
    "zstandard~=0.25",
]
