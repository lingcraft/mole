[project]
name = "mole"
version = "1.10.6"
description = """
- 优化：现在不固定注入 ext.xml 的端口以及和 swf 进行 socket 通信的端口，改为动态获取，解决运行多个客户端会冲突的问题
- 优化：BridgeDLL.swf 的源码提交 git 并设为本仓库的子模块
"""
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "cffi~=2.1.0",
    "nuitka~=4.1.3",
    "packaging~=26.2",
    "py3amf~=0.9.1",
    "pypinyin~=0.55.0",
    "pyside6~=6.11.1",
    "requests~=2.34.2",
    "zstandard~=0.25",
]
