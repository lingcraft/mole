[project]
name = "mole"
version = "1.9.2"
description = """
- 优化：将所有功能用run_later()进行固定延迟后执行的地方都改为run_later_expect()，等待到特定包结果后再执行，提升执行速度，同时避免了偶尔出现的若固定延迟350ms后仍没有收到特定包结果导致的执行bug
- 优化：摩摩怪也改为使用run_later_expect()之后，缩短timer的执行间隔，大幅提升执行速度
- 修复：修复摩摩怪当挑战未达等级要求的关卡时，后续逻辑进入死循环的问题，现在增加判断，若挑战失败则停止挑战
- 修复：修复run_later_expect()的多目标包收到后执行func()的传参问题
- 修复：修复摩摩怪向小游戏服务发送的包无法显示的问题，优化get_remote_info()的判断
- 修复：修复若接受了好友请求，但是本地Flash缓存信息还未刷新时，启动后读取缓存的好友列表报错的问题，因为新加的好友信息字典还没有friend字段，增加判断
"""
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "cffi~=2.1.0",
    "nuitka~=4.1.3",
    "packaging~=26.2",
    "py3amf~=0.9.1",
    "pypinyin~=0.55.0",
    "pyside6~=6.11.1",
    "requests~=2.34.2",
    "zstandard~=0.25",
]
