[project]
name = "mole"
version = "1.9.4"
description = """
- 优化：餐厅自动做菜增加状态机，从而显示“准备中”、“倒计时”、“正在登录”、“登录成功”、“做菜中”、“做菜完成”几个状态信息，更加人性化，并且显示时间最少0.2秒，防止状态切换过快而看不到
- 优化：每次做菜流程间隔缩小到“目标菜成熟时间”+10秒，不浪费过多时间
- 优化：做菜客户端增加做菜完成状态判断，距离上次发包超过1秒就判定为1批做菜完成，并上报给主程序“做菜完成”状态
"""
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "cffi~=2.1.0",
    "nuitka~=4.1.3",
    "packaging~=26.2",
    "py3amf~=0.9.1",
    "pypinyin~=0.55.0",
    "pyside6~=6.11.1",
    "requests~=2.34.2",
    "zstandard~=0.25",
]
