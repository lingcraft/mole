[project]
name = "mole"
version = "1.8.0"
description = """
- 新增：餐厅做菜改为协议端处理，从而避免在餐厅过久导致卡顿的问题，同时在收菜时会挤掉游戏区域已登录账号
- 修复：餐厅菜的数据增加烧糊时间，修复极个别菜的烧糊时间不是完成时间的3倍从而导致判断错误的问题
- 修复：修复摩摩怪挑战好友的顺序问题，现在可以正常按“大大”、“小小”和“好友”（等级从高到低）的顺序了，使用双端队列优化性能
- 优化：摩摩怪的好友直接读取本地 Flash 缓存的数据，不再需要在摩摩怪场景打开好友列表窗口之后才能挑战了
- 优化：元素骑士进阶卡牌的满级卡牌数据使用双端队列优化性能
- 优化：获取字典值时不再滥用.get()方法，而是直接使用[]来获取
"""
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "cffi~=2.1.0",
    "nuitka~=4.1.3",
    "packaging~=26.2",
    "py3amf~=0.9.0",
    "pypinyin~=0.55.0",
    "pyside6~=6.11.1",
    "requests~=2.34.2",
    "zstandard~=0.25",
]
