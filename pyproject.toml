[project]
name = "mole"
version = "1.7.22"
description = """
- 优化：元素骑士若“无尽深渊”最高挑战层数达到50层，但实际装备卡牌战力过低时，不发送“无尽深渊”和“莎士摩亚”挑战包（用来获取已挑战次数）浪费体力
"""
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "cffi~=2.0.0",
    "nuitka~=4.1.3",
    "packaging~=26.2",
    "pypinyin~=0.55.0",
    "pyside6~=6.11.1",
    "requests~=2.34.2",
]
