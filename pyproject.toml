[project]
name = "mole"
version = "1.7.24"
description = """
- 优化：封包列表不显示 HTTP 请求、XML 结果等无关数据，发送、接收包处理逻辑优化
- 优化：登录相关包解析优化
- 新增：读取本地 Flash 缓存中的账号和密码的MD5哈希信息，以便于之后餐厅做菜功能升级
"""
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "cffi~=2.0.0",
    "nuitka~=4.1.3",
    "packaging~=26.2",
    "py3amf~=0.9.0",
    "pypinyin~=0.55.0",
    "pyside6~=6.11.1",
    "requests~=2.34.2",
    "zstandard~=0.25",
]
