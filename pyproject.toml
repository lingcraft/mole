[project]
name = "mole"
version = "1.7.12"
description = """
- 优化：元素骑士关卡增加“中秋探险”和“挑战汉青”，这2个关卡卡牌经验期望最高
- 优化：元素骑士挑战逻辑优化，增加关卡体力消耗相关计算
- 优化：元素骑士挑战封包解析优化（“挑战关卡”、“探索关卡”和“关卡信息”）
"""
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "cffi~=2.0.0",
    "nuitka~=4.1.3",
    "packaging~=26.2",
    "pypinyin~=0.55.0",
    "pyside6~=6.11.1",
    "requests~=2.34.2",
]
