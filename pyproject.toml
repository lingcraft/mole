[project]
name = "mole"
version = "1.10.0"
description = """
- 新增：ClientCommonDLL.swf 进行补丁从而使 python 程序能够调用其原生方法，并在客户端加载时注入替换 swf 文件，ClientCommonDLL.swf 和主程序通过命令桥进行协作（目前只能在官服有效）
- 新增：现在可以调用 Flash 原生的地图跳转、弹窗提示和获得的物品信息提示功能
- 新增：卡罗拉祝福的幸运儿四色铃铛小游戏自动完成，并通过游戏内弹窗提示获得的物品
- 优化：一键开启缤纷七彩宝盒的提示现在也换成了游戏内弹窗
- 优化：摩摩怪开始游戏时调用原生的地图挑战，防止偶现的异常发生
"""
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "cffi~=2.1.0",
    "nuitka~=4.1.3",
    "packaging~=26.2",
    "py3amf~=0.9.1",
    "pypinyin~=0.55.0",
    "pyside6~=6.11.1",
    "requests~=2.34.2",
    "zstandard~=0.25",
]
