- 优化：元素骑士挑战封包数量和类别优化，去除冗余包（经过之前的后台发包显示问题修复以及元素骑士的封包功能解析优化后，现在不需要额外发包来解决部分包无效的问题）
- 优化：元素骑士挑战封包解析优化（“每日任务信息”、“每日任务领奖”）
"""
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "cffi~=2.0.0",
    "nuitka~=4.1.3",
    "packaging~=26.2",
    "pypinyin~=0.55.0",
    "pyside6~=6.11.1",
    "requests~=2.34.2",
]
