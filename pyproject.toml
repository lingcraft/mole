[project]
name = "mole"
version = "1.8.1"
description = """
- 修复：客户端做菜之后没有发送做菜后续步骤包的问题
- 优化：客户端增加断线重连逻辑
- 新增：增加客户端登录后的只发送一次的初始化包逻辑
- 新增：增加根据餐厅内部装潢类型判断餐厅灶台数的逻辑
- 新增：餐厅增加空灶台做菜逻辑，现在灶台为"酱爆雪顶菇"、"阳光酥油肉松"或空的灶台都可以自动做菜改菜收菜了
"""
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "cffi~=2.1.0",
    "nuitka~=4.1.3",
    "packaging~=26.2",
    "py3amf~=0.9.0",
    "pypinyin~=0.55.0",
    "pyside6~=6.11.1",
    "requests~=2.34.2",
    "zstandard~=0.25",
]
